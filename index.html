<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Mời Đặc Biệt 💌</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeaa7; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation; /* Giúp mobile mượt hơn */
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(253, 121, 168, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        .gif-container img {
            width: 200px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #636e72;
            font-size: 16px;
            margin-bottom: 30px;
        }
        /* Tách riêng container chứa 2 nút để khi nút No chạy mất, No không đè lên Yes */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            height: 45px;
            align-items: center;
            /* Giữ vị trí tương đối để khi nút No nhảy mất, bố cục container không thay đổi */
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            user-select: none; /* Ngăn chặn bôi đen chữ khi bấm liên tục */
        }
        #yes-btn {
            background-color: #fd79a8;
            color: white;
            box-shadow: 0 4px 15px rgba(253, 121, 168, 0.4);
            z-index: 10;
        }
        #yes-btn:hover {
            background-color: #e84393;
            transform: scale(1.05);
        }
        #no-btn {
            background-color: #dfe6e9;
            color: #2d3436;
            position: absolute; /* Quan trọng: Bắt đầu ở vị trí tuyệt đối */
            z-index: 20;
            transition: left 0.1s ease, top 0.1s ease; /* Thêm hiệu ứng trượt nhẹ */
        }
        #success-msg {
            display: none;
        }
        .food-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .food-btn {
            background: #fff;
            border: 2px solid #fd79a8;
            color: #e84393;
            padding: 12px;
            font-size: 16px;
        }
        .food-btn:hover {
            background: #fd79a8;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div class="gif-container">
            <img src="https://media.tenor.com/ef3Gz4Y9Q4AAAAAj/tkthao219-bubududu.gif" alt="Cute Bear">
        </div>
        <h1>Đi ăn tối với anh nhé? 🥺</h1>
        <p>Hôm nay em đã vất vả rồi, để anh mời em một bữa ngon nha!</p>
        
        <div class="buttons" id="btn-container">
            <button id="yes-btn">Dạ đồng ý! ❤️</button>
            <button id="no-btn">Em bận rồi 💔</button>
        </div>
    </div>

    <div class="card" id="success-msg">
        <div class="gif-container">
            <img src="https://media.tenor.com/tHqgUAnE-zIAAAAj/tkthao219-bubududu.gif" alt="Happy Bear">
        </div>
        <h1>Yayyyy! 🥰</h1>
        <p>Công chúa muốn ăn gì để anh chuẩn bị nào?</p>
        <div class="food-options">
            <button class="food-btn">🍕 Pizza ngập phô mai</button>
            <button class="food-btn">🥩 Bít tết lãng mạn</button>
            <button class="food-btn">🍣 Sushi thanh mát</button>
            <button class="food-btn">🍲 Gì cũng được ạ</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainCard = document.getElementById('main-card');
        const successMsg = document.getElementById('success-msg');
        const foodBtns = document.querySelectorAll('.food-btn');

        // Hàm di chuyển nút No né tránh
        function moveButton(e) {
            // 1. NGĂN CHẶN SỰ KIỆN CLICK SƠ CẤP (QUAN TRỌNG NHẤT)
            if(e) e.preventDefault();

            // Chuyển nút sang chế độ fixed để nhảy toàn màn hình
            noBtn.style.position = 'fixed';
            
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            // Tính toán giới hạn màn hình
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;
            
            // Random tọa độ, đảm bảo nó cách xa vị trí cũ ít nhất 20% chiều rộng màn hình
            let randomX, randomY;
            const safeDistance = window.innerWidth * 0.2;
            
            const currentX = parseInt(noBtn.style.left) || window.innerWidth/2;
            const currentY = parseInt(noBtn.style.top) || window.innerHeight/2;

            do {
                randomX = Math.floor(Math.random() * maxX);
                randomY = Math.floor(Math.random() * maxY);
            } while (
                Math.abs(randomX - currentX) < safeDistance && 
                Math.abs(randomY - currentY) < safeDistance
            );

            // Gán tọa độ mới
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // --- CỬ CHỈ CHO MÁY TÍNH ---
        // Sử dụng mouseover: Chỉ cần đưa chuột lại gần là chạy
        noBtn.addEventListener('mouseover', moveButton);

        // --- CỬ CHỈ CHO ĐIỆN THOẠI ---
        // Sử dụng touchstart + e.preventDefault() để chặn cái click vô tình
        noBtn.addEventListener('touchstart', moveButton, {passive: false});

        // Chuyển màn hình khi bấm Đồng ý
        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none';
            successMsg.style.display = 'block';
        });

        // Xử lý khi cô ấy chọn món ăn
        foodBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const monAn = e.target.innerText;
                alert(`Tuyệt vời! Em đã chọn: "${monAn}".\n\nHãy chụp màn hình thông báo này và gửi cho THAI NGUYEN ngay nhé! Hẹn gặp em tối nay ❤️`);
            });
        });
    </script>
</body>
</html>
